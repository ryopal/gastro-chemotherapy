<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>胃癌化学療法 Key Trials</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow" id="datasetEyebrow">Chemotherapy Evidence</p>
          <h1 id="datasetTitle">胃癌化学療法 Key Trials</h1>
        </div>
        <div class="hero-metrics" aria-label="データ概要">
          <div>
            <span id="metricTrials">0</span>
            <small>試験行</small>
          </div>
          <div>
            <span id="metricLines">0</span>
            <small>治療ライン</small>
          </div>
        </div>
      </section>

      <nav class="dataset-tabs" aria-label="癌種切り替え" id="datasetTabs"></nav>

      <section class="control-band" aria-label="絞り込み">
        <label class="search-box">
          <span>全体検索</span>
          <input id="globalSearch" type="search" placeholder="試験名、レジメン、対象患者、DOIなど">
        </label>
        <label class="standard-filter">
          <input id="standardOnly" type="checkbox">
          <span>標準治療のみ</span>
        </label>
        <div class="quick-filters" id="lineFilters" aria-label="治療ライン"></div>
        <button class="ghost-button" id="resetFilters" type="button">リセット</button>
      </section>
      

      <section class="table-section">
        <div class="table-toolbar">
          <div>
            <strong id="resultCount">0件</strong>
            <span>表示中</span>
          </div>
        </div>
        <div class="table-wrap">
          <table id="trialsTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="trial-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
